<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肩叩き銀行 窓口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col items-center">

    <nav class="w-full bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10 flex justify-center">
        <div class="max-w-md w-full flex items-center justify-between font-bold text-slate-800">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M2 9V5.2a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2V9"></path><path d="M2 15v3.8a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V15"></path><rect x="2" y="9" width="20" height="6" rx="2"></rect></svg>
                <span>肩叩き銀行 使用窓口</span>
            </div>
            <!-- 設定ボタン -->
            <button id="setupBtn" class="text-slate-300 hover:text-slate-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-md w-full p-5 space-y-6">
        <!-- セットアップガイド -->
        <div id="setupGuide" class="hidden p-4 bg-slate-800 text-white rounded-2xl text-[10px] space-y-2 animate-in shadow-inner">
            <p class="font-bold text-orange-400">データが見えない場合、SQL Editorで下記を実行：</p>
            <code class="block bg-black/50 p-2 rounded text-indigo-300 font-mono">
                ALTER TABLE tickets DISABLE ROW LEVEL SECURITY;
            </code>
        </div>

        <!-- メッセージ -->
        <div id="messageBox" class="hidden p-4 rounded-2xl flex items-center gap-3 border animate-in shadow-sm">
            <div id="messageIcon"></div>
            <p id="messageText" class="text-sm font-bold"></p>
        </div>

        <!-- QRスキャナー用オーバーレイ -->
        <div id="scannerOverlay" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
            <div class="p-4 flex justify-end">
                <button id="closeScannerBtn" class="text-white p-2 bg-white/10 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="reader" class="flex-1"></div>
        </div>

        <!-- メインカード -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-black tracking-tight">券を使用する</h2>
                <button id="scanBtn" class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-full text-sm font-bold active:scale-95 transition-all shadow-lg shadow-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    <span>スキャン</span>
                </button>
            </div>

            <form id="useForm" class="space-y-8">
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Ticket ID</label>
                    <input type="text" id="ticketId" required placeholder="IDを貼り付け" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-xs text-indigo-900 transition-all">
                </div>

                <div class="space-y-4">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Use Amount</label>
                    <input type="text" id="amount" inputmode="numeric" value="1" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-black text-center text-3xl text-slate-800">
                    
                    <div class="grid grid-cols-4 gap-3">
                        <button type="button" data-amt="1" class="amt-btn py-3 text-sm font-bold rounded-2xl border bg-white border-slate-200 text-slate-500 hover:bg-slate-50 transition-all">1</button>
                        <button type="button" data-amt="3" class="amt-btn py-3 text-sm font-bold rounded-2xl border bg-white border-slate-200 text-slate-500 hover:bg-slate-50 transition-all">3</button>
                        <button type="button" data-amt="5" class="amt-btn py-3 text-sm font-bold rounded-2xl border bg-white border-slate-200 text-slate-500 hover:bg-slate-50 transition-all">5</button>
                        <button type="button" id="allBtn" class="py-3 text-xs font-black rounded-2xl border bg-white border-slate-200 text-slate-400 transition-all">全部</button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-black disabled:bg-slate-100 disabled:text-slate-300 text-white py-5 rounded-[1.5rem] font-black text-lg transition-all active:scale-[0.98] shadow-xl shadow-slate-200 flex items-center justify-center gap-3">
                    <span>使用を確定する</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>
        </div>

        <!-- バランス表示 -->
        <div id="balanceCard" class="hidden mt-4 p-8 bg-gradient-to-br from-indigo-600 to-blue-700 rounded-[2.5rem] text-white flex items-center justify-between shadow-2xl shadow-indigo-200 relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-indigo-200 text-[10px] font-black uppercase tracking-widest mb-1">Balance</p>
                <h3 class="text-xl font-bold">現在の残り回数</h3>
            </div>
            <div class="text-6xl font-black relative z-10 tracking-tighter">
                <span id="balanceNum">0</span><span class="text-sm ml-2 opacity-50 font-normal tracking-normal">回</span>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-10 text-[10px] text-slate-300 font-bold uppercase tracking-[0.2em]">
        Katamaki Bank Terminal
    </footer>

    <script>
        // グローバルに定義して確実にアクセス可能にする
        (function() {
            const SUPABASE_URL = 'https://qfzyrogwyjbzbblnvqzy.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_tXLLvKe_L-27OsGU-GH3Zw_176oxBqw';
            
            let supabase;
            let html5QrCode;
            let currentCount = 0;

            const fetchStatus = async (id) => {
                if (id.length < 10) {
                    document.getElementById('balanceCard').classList.add('hidden');
                    return;
                }
                try {
                    const { data } = await supabase.from('tickets').select('count').eq('id', id).maybeSingle();
                    if (data) {
                        currentCount = data.count;
                        document.getElementById('balanceNum').innerText = currentCount;
                        document.getElementById('balanceCard').classList.remove('hidden');
                        updateButtonStyles();
                    } else {
                        document.getElementById('balanceCard').classList.add('hidden');
                    }
                } catch (e) { console.error(e); }
            };

            const updateButtonStyles = () => {
                const currentVal = document.getElementById('amount').value;
                document.querySelectorAll('.amt-btn').forEach(btn => {
                    if (btn.getAttribute('data-amt') === currentVal) {
                        btn.classList.add('bg-indigo-600', 'border-indigo-600', 'text-white', 'shadow-md');
                        btn.classList.remove('bg-white', 'text-slate-500');
                    } else {
                        btn.classList.remove('bg-indigo-600', 'border-indigo-600', 'text-white', 'shadow-md');
                        btn.classList.add('bg-white', 'text-slate-500');
                    }
                });
                
                const allBtn = document.getElementById('allBtn');
                if (currentCount > 0 && currentVal === currentCount.toString()) {
                    allBtn.classList.add('bg-indigo-600', 'border-indigo-600', 'text-white', 'shadow-md');
                    allBtn.classList.remove('bg-white', 'text-slate-400');
                } else {
                    allBtn.classList.remove('bg-indigo-600', 'border-indigo-600', 'text-white', 'shadow-md');
                    allBtn.classList.add('bg-white', 'text-slate-400');
                }
            };

            const showMessage = (text, type) => {
                const box = document.getElementById('messageBox');
                const txt = document.getElementById('messageText');
                const icon = document.getElementById('messageIcon');
                
                box.className = `p-4 rounded-2xl flex items-center gap-3 border animate-in shadow-sm ${
                    type === 'success' ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-red-50 text-red-700 border-red-200'
                }`;
                txt.innerText = text;
                icon.innerHTML = type === 'success' 
                    ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                    : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
                
                box.classList.remove('hidden');
                setTimeout(() => box.classList.add('hidden'), 5000);
            };

            const setLoading = (state) => {
                const btn = document.getElementById('submitBtn');
                btn.disabled = state;
                btn.innerHTML = state ? '処理中...' : '<span>使用を確定する</span><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
            };

            const startScanner = () => {
                document.getElementById('scannerOverlay').classList.remove('hidden');
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        const uuidMatch = decodedText.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
                        if (uuidMatch) {
                            document.getElementById('ticketId').value = uuidMatch[0];
                            fetchStatus(uuidMatch[0]);
                            stopScanner();
                        }
                    },
                    () => {}
                ).catch(err => {
                    console.error("Scanner error:", err);
                    document.getElementById('scannerOverlay').classList.add('hidden');
                });
            };

            const stopScanner = () => {
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(() => {
                        document.getElementById('scannerOverlay').classList.add('hidden');
                        html5QrCode.clear();
                    }).catch(() => {
                        document.getElementById('scannerOverlay').classList.add('hidden');
                    });
                } else {
                    document.getElementById('scannerOverlay').classList.add('hidden');
                }
            };

            const handleUse = async (e) => {
                e.preventDefault();
                const id = document.getElementById('ticketId').value.trim();
                const amount = parseInt(document.getElementById('amount').value);
                
                if (!id || isNaN(amount) || amount <= 0) return;

                setLoading(true);
                try {
                    const { data: ticket } = await supabase.from('tickets').select('*').eq('id', id).single();
                    if (!ticket) throw new Error('券が見つかりません。');
                    if (ticket.count < amount) throw new Error(`回数が足りません（残り: ${ticket.count}回）`);

                    const newCount = ticket.count - amount;
                    const { error: updateError } = await supabase.from('tickets').update({ count: newCount }).eq('id', id);
                    if (updateError) throw updateError;

                    showMessage(`使用完了！残り${newCount}回です。`, 'success');
                    document.getElementById('amount').value = '1';
                    fetchStatus(id);
                } catch (err) {
                    showMessage(err.message, 'error');
                } finally {
                    setLoading(false);
                }
            };

            const toggleSetup = () => {
                document.getElementById('setupGuide').classList.toggle('hidden');
            };

            // 初期化
            window.onload = () => {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // イベントリスナーの登録（onclickを使わずに安全に登録）
                document.getElementById('setupBtn').onclick = toggleSetup;
                document.getElementById('scanBtn').onclick = startScanner;
                document.getElementById('closeScannerBtn').onclick = stopScanner;
                document.getElementById('allBtn').onclick = () => {
                    if (currentCount > 0) {
                        document.getElementById('amount').value = currentCount;
                        updateButtonStyles();
                    }
                };

                document.querySelectorAll('.amt-btn').forEach(btn => {
                    btn.onclick = () => {
                        document.getElementById('amount').value = btn.getAttribute('data-amt');
                        updateButtonStyles();
                    };
                });

                document.getElementById('ticketId').oninput = (e) => fetchStatus(e.target.value.trim());
                document.getElementById('amount').oninput = (e) => {
                    e.target.value = e.target.value.replace(/\D/g, '');
                    updateButtonStyles();
                };
                document.getElementById('useForm').onsubmit = handleUse;
            };

            // windowオブジェクトに関数を公開（保険）
            window.toggleSetup = toggleSetup;
            window.startScanner = startScanner;
            window.stopScanner = stopScanner;
        })();
    </script>
</body>
</html>
